    <title>Dashboard</title>
    <script>
      // Update tab title once user logs in. AuthContext stores user in
      // localStorage (we mirror it just for the title; main state still in React).
      try {
        var u = localStorage.getItem('user_info');
        if (u) { var p = JSON.parse(u); if (p && p.store_name) document.title = p.store_name + ' Dashboard'; }
      } catch (e) {}
    </script>
