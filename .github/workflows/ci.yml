name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-syntax:
    name: Backend — Python syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check syntax of ALL .py files
        run: |
          cd backend
          python -m compileall -q app
      - name: Verify routers import individually (sin DB)
        run: |
          cd backend
          # Each router file should at minimum be importable as a module syntactically
          python -c "
          import os, sys, importlib.util, pathlib
          api_dir = pathlib.Path('app/api')
          fail = []
          for f in sorted(api_dir.glob('*.py')):
              if f.name == '__init__.py': continue
              spec = importlib.util.spec_from_file_location(f.stem, f)
              try:
                  # Solo parsea, no ejecuta (importlib parsea al __init__)
                  source = f.read_text()
                  compile(source, str(f), 'exec')
                  print(f'  ✓ {f.name}')
              except Exception as e:
                  fail.append((f.name, str(e)))
                  print(f'  ✗ {f.name}: {e}')
          if fail:
              sys.exit(1)
          print(f'\nAll {len(list(api_dir.glob(\"*.py\")))-1} routers syntactically valid')
          "

  frontend-build:
    name: Frontend — vite build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd frontend/setup-panel && npm ci
      - run: cd frontend/setup-panel && npm run build
